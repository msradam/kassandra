stages:
  - validate
  - test
  - review

validate-k6-scripts:
  stage: validate
  image: grafana/k6:latest
  script:
    - k6 version
    - for f in tests/k6/*.js samples/expected/*.js; do
        echo "Inspecting $f...";
        k6 inspect "$f" || exit 1;
      done
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint-python:
  stage: validate
  image: python:3.12-slim
  script:
    - pip install ruff
    - ruff check simulator/
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-review:
  stage: review
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    url: https://${CI_ENVIRONMENT_SLUG}.review.example.com
    on_stop: stop-review
  script:
    - echo "Review environment deployed"
  rules:
    - if: $CI_MERGE_REQUEST_IID

stop-review:
  stage: review
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    action: stop
  script:
    - echo "Stopping review environment"
  when: manual
  rules:
    - if: $CI_MERGE_REQUEST_IID
