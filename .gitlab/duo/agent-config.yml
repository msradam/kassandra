setup_script:
  - curl -fsSL https://github.com/grafana/k6/releases/download/v0.56.0/k6-v0.56.0-linux-amd64.tar.gz -o /tmp/k6.tar.gz
  - tar -xzf /tmp/k6.tar.gz -C /tmp
  - mv /tmp/k6-v0.56.0-linux-amd64/k6 /usr/local/bin/k6
  - chmod +x /usr/local/bin/k6
  - k6 version
  - pip install fastapi uvicorn pyjwt 2>/dev/null
  - cd demos/pageturn && python3 -m uvicorn pageturn.main:app --host 0.0.0.0 --port 8000 &
  - sleep 3
  - curl -sf http://localhost:8000/api/health && echo "PageTurn is running" || echo "WARN PageTurn health check failed"
