setup_script:
  # ── k6 ──
  - curl -fsSL https://github.com/grafana/k6/releases/download/v0.56.0/k6-v0.56.0-linux-amd64.tar.gz -o /tmp/k6.tar.gz
  - tar -xzf /tmp/k6.tar.gz -C /tmp
  - mv /tmp/k6-v0.56.0-linux-amd64/k6 /usr/local/bin/k6
  - chmod +x /usr/local/bin/k6
  - k6 version

  # ── Install dependencies only (processes don't survive into agent phase) ──
  # Calliope Books (Node.js)
  - (cd demos/calliope-books && npm install 2>&1 | tail -10)
  # Midas Bank (Python)
  - bash -c "pip3 install --break-system-packages -r demos/midas-bank/requirements.txt 2>&1 | tail -5 || pip install --break-system-packages -r demos/midas-bank/requirements.txt 2>&1 | tail -5 || echo WARNING pip install failed"
  - bash -c "python3 -c 'import fastapi; print(fastapi.__version__)' || echo FATAL FastAPI not available"
