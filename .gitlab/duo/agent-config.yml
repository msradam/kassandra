setup_script:
  - curl -fsSL https://github.com/grafana/k6/releases/download/v0.56.0/k6-v0.56.0-linux-amd64.tar.gz -o /tmp/k6.tar.gz
  - tar -xzf /tmp/k6.tar.gz -C /tmp
  - mv /tmp/k6-v0.56.0-linux-amd64/k6 /usr/local/bin/k6
  - chmod +x /usr/local/bin/k6
  - k6 version
  - /usr/local/bin/python3.12 -m pip install --quiet fastapi uvicorn pyjwt
  - PYTHONPATH=demos/pageturn nohup /usr/local/bin/python3.12 -m uvicorn pageturn.main:app --host 0.0.0.0 --port 8000 --app-dir demos/pageturn > /tmp/pageturn.log 2>&1 &
  - sleep 3
  - curl -sf http://localhost:8000/api/health && echo "PageTurn running" || (cat /tmp/pageturn.log && echo "FAILED")
