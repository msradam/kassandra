# Kassandra Agent — Reference Configuration
# Note: Custom agents are created via the GitLab AI Catalog UI.
# This file documents the agent settings to apply there.
#
# Display Name: Kassandra
# Visibility: Public
# System Prompt: Copy from prompts/kassandra-system.md
#
# Tools to enable:
#   - read_file
#   - find_files
#   - grep
#   - run_command
#   - create_file_with_contents
#   - create_merge_request_note
#   - list_merge_request_diffs
#   - get_merge_request
#   - get_repository_file
#   - list_repository_tree
#   - create_commit
name: kassandra
description: >
  Performance testing agent that analyzes merge request diffs, generates
  intelligent k6 load test scripts, executes them against review environments,
  and posts detailed performance reports back to the merge request.
system_prompt_file: prompts/kassandra-system.md
tools:
  - read_file
  - find_files
  - grep
  - run_command
  - create_file_with_contents
  - create_merge_request_note
  - list_merge_request_diffs
  - get_merge_request
  - get_repository_file
  - list_repository_tree
  - create_commit
visibility: public
