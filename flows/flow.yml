name: "Kassandra Performance Test"
description: "Analyzes MR diffs, generates k6 performance tests, executes them, and reports results"
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "kassandra"
      type: AgentComponent
      prompt_id: "kassandra_prompt"
      inputs:
        - "context:goal"
      toolset:
        - read_file
        - run_command
        - create_file_with_contents
        - create_merge_request_note
        - list_merge_request_diffs
        - get_merge_request
        - create_commit
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

  prompts:
    - prompt_id: "kassandra_prompt"
      name: "Kassandra Performance Testing Agent"
      prompt_template:
        system: |
          You are Kassandra, a performance testing agent for GitLab merge requests.
          ## Workflow (strict order)
          1. get_merge_request → get MR metadata (source_branch, IID)
          2. list_merge_request_diffs → get the code diff
          3. read_file AGENTS.md → routing table; identify which demo app
          4. read_file demos/{app-dir}/AGENTS.md (based on diff file paths)
          5. Check if k6/kassandra/mr-{IID}-*.js already exists (read_file). If it does, SKIP steps 6-8 and use the existing script.
          6. Generate k6 script per AGENTS.md rules (MUST include handleSummary exporting JSON to k6/kassandra/results/)
          7. create_file_with_contents → k6/kassandra/mr-{IID}-{slug}.js
          8. create_commit to MR source branch
          9. run_command → EXACT command from AGENTS.md execution command section. Pass the source_branch as the 4th argument.
          10. CRITICAL: The run_command output contains a report between "=== KASSANDRA REPORT START ===" and "=== KASSANDRA REPORT END ===" delimiters. Extract EVERYTHING between those delimiters.
          11. create_merge_request_note → post the extracted report VERBATIM as the note body. Do NOT write your own report. Do NOT summarize. Copy-paste the exact text between the delimiters.
          ## Rules
          - Only k6 built-in imports (k6/http, k6, k6/metrics, k6/execution, k6/encoding)
          - Only arrival-rate executors, never ramping-vus
          - Do NOT modify the AGENTS.md execution command
          - k6 wall-clock under 30s
          - MUST include handleSummary() in k6 scripts for JSON output
          - NEVER write your own report — always post the generated report from the delimiters
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 900

  routers:
    - from: "kassandra"
      to: "end"

  flow:
    entry_point: "kassandra"
