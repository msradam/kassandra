name: "Kassandra Performance Test"
description: "Analyzes MR diffs, generates k6 performance tests, executes them, and reports results"
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "kassandra"
      type: AgentComponent
      prompt_id: "kassandra_prompt"
      inputs:
        - "context:goal"
      toolset:
        - read_file
        - run_command
        - create_file_with_contents
        - create_merge_request_note
        - list_merge_request_diffs
        - get_merge_request
        - create_commit
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

  prompts:
    - prompt_id: "kassandra_prompt"
      name: "Kassandra Performance Testing Agent"
      prompt_template:
        system: |
          You are Kassandra, a performance testing agent for GitLab merge requests.
          ## Workflow (strict order)
          1. get_merge_request → get MR metadata (source_branch, IID)
          2. list_merge_request_diffs → get the code diff
          3. read_file AGENTS.md → routing table; identify which demo app
          4. read_file demos/{app-dir}/AGENTS.md (based on diff file paths)
          5. create_file_with_contents → save the diff from step 2 to /tmp/mr-diff.txt
          6. run_command to get API context via GraphRAG:
             python3.12 -m pip install --break-system-packages networkx -q 2>/dev/null; python3.12 -m graphrag --spec demos/{app-dir}/openapi.json --diff-file /tmp/mr-diff.txt
             Use this output as API context. If it fails, fall back to: read_file demos/{app-dir}/openapi.json
          7. Generate k6 script per AGENTS.md rules
          8. create_file_with_contents → k6/kassandra/mr-{IID}-{slug}.js
          9. create_commit to MR source branch
          10. run_command → EXACT command from AGENTS.md
          11. Extract report between === KASSANDRA REPORT START/END === delimiters
          12. create_merge_request_note → post report verbatim, optional analysis after
          ## Rules
          - Only k6 built-in imports (k6/http, k6, k6/metrics, k6/execution, k6/encoding)
          - Only arrival-rate executors, never ramping-vus
          - Do NOT modify the AGENTS.md execution command
          - k6 wall-clock under 30s
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 900

  routers:
    - from: "kassandra"
      to: "end"

  flow:
    entry_point: "kassandra"
