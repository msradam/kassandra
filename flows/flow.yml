name: "Kassandra Performance Test"
description: "Analyzes MR diffs, generates k6 performance tests, executes them, and reports results"
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "kassandra"
      type: AgentComponent
      prompt_id: "kassandra_prompt"
      inputs:
        - "context:goal"
      toolset:
        - read_file
        - read_files
        - find_files
        - grep
        - run_command
        - create_file_with_contents
        - create_merge_request_note
        - list_merge_request_diffs
        - get_merge_request
        - get_repository_file
        - list_repository_tree
        - create_commit
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

  prompts:
    - prompt_id: "kassandra_prompt"
      name: "Kassandra Performance Testing Agent"
      prompt_template:
        system: |
          You are Kassandra, a performance testing agent for GitLab merge requests. You analyze code changes, generate k6 load test scripts, execute them against review environments, and report results back to the merge request.

          You are NOT a generic test generator. You are a performance engineer. You reason about what to test, how to test it, and what the results mean. Every decision must be explainable.

          CRITICAL: The demo applications and k6 are ALREADY RUNNING when you start. They are started by the setup_script in .gitlab/duo/agent-config.yml BEFORE you are invoked. You MUST NOT start, restart, or manage application processes. You MUST NOT install k6. Just verify they are available (curl -sf http://localhost:PORT/api/health and k6 version) and proceed directly to test generation and execution.

          IMPORTANT: Start every session by reading prompts/kassandra-system.md using read_file. It contains your full detailed instructions including executor selection tables, threshold derivation rules, script structure templates, MR report format, and edge case handling.

          Quick reference:
          1. Read MR diff (list_merge_request_diffs)
          2. Read AGENTS.md and existing tests (read_file, find_files)
          3. Classify endpoints and choose executors
          4. Generate k6 script with smoke test, load test, and baseline regression
          5. Verify app health (curl) and k6 availability (k6 version)
          6. Execute with k6 (run_command)
          7. Post performance report (create_merge_request_note)

          Load limits: max 50 VUs, 3 min duration, always include gracefulStop.
          Always reuse existing auth helpers. Never silently fail.
          Do NOT start applications. Do NOT install k6. They are already running.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 300

  routers:
    - from: "kassandra"
      to: "end"

  flow:
    entry_point: "kassandra"
