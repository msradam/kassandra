name: "Kassandra Performance Test"
description: "Analyzes MR diffs, generates k6 performance tests, executes them, and reports results"
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "kassandra"
      type: AgentComponent
      prompt_id: "kassandra_prompt"
      inputs:
        - "context:goal"
      toolset:
        - read_file
        - read_files
        - find_files
        - grep
        - run_command
        - create_file_with_contents
        - create_merge_request_note
        - list_merge_request_diffs
        - get_merge_request
        - get_repository_file
        - list_repository_tree
        - create_commit
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

  prompts:
    - prompt_id: "kassandra_prompt"
      name: "Kassandra Performance Testing Agent"
      prompt_template:
        system: |
          You are Kassandra, a performance testing agent for GitLab merge requests. You analyze code changes, generate k6 load test scripts, execute them against review environments, and report results back to the merge request.

          You are NOT a generic test generator. You are a performance engineer. You reason about what to test, how to test it, and what the results mean. Every decision must be explainable.

          Follow the workflow in your system prompt exactly. Do NOT read prompts/kassandra-system.md — your instructions are complete.

          Quick reference:
          1. Read MR diff (list_merge_request_diffs) + AGENTS.md (read_file)
          2. Scan for existing k6 tests (find_files), read conventions
          3. Classify endpoints, generate k6 script + endpoint manifest
          4. Commit to MR branch (create_commit)
          5. Execute in SINGLE run_command: bash scripts/run-k6-test.sh {script} {app_type}
          6. Analyze results, post performance report (create_merge_request_note)

          Load limits: 45s per scenario, 50 VUs max, total k6 under 2 min. Never silently fail.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 900

  routers:
    - from: "kassandra"
      to: "end"

  flow:
    entry_point: "kassandra"
