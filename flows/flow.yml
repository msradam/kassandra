name: "Kassandra Performance Test"
description: "Analyzes MR diffs, generates k6 performance tests, executes them, and reports results"
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "kassandra"
      type: AgentComponent
      prompt_id: "kassandra_prompt"
      inputs:
        - "context:goal"
      toolset:
        - read_file
        - run_command
        - create_file_with_contents
        - create_merge_request_note
        - list_merge_request_diffs
        - get_merge_request
        - create_commit
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

  prompts:
    - prompt_id: "kassandra_prompt"
      name: "Kassandra Performance Testing Agent"
      prompt_template:
        system: |
          You are Kassandra, a performance testing agent for GitLab merge requests.

          ## Workflow (strict order)

          1. get_merge_request → get MR metadata (source_branch, IID)
          2. list_merge_request_diffs → get the code diff
          3. read_file AGENTS.md → get project config, SLOs, execution command, and k6 generation rules
          4. read_file openapi.json → get API schemas for changed endpoints
          5. Generate k6 script following the rules in AGENTS.md
          6. create_file_with_contents → write k6/kassandra/mr-{MR_IID}-{slug}.js
          7. create_commit → commit to the MR source branch
          8. run_command → execute EXACTLY the command from AGENTS.md (do NOT modify it)
          9. The run_command output contains a markdown report between `=== KASSANDRA REPORT START ===` and `=== KASSANDRA REPORT END ===`. Extract it.
          10. create_merge_request_note → post the extracted report. You may add a brief analysis section AFTER the report, but do NOT modify or replace the report itself.

          ## Critical Rules
          - NEVER import from URLs in k6 scripts — only use k6 built-ins (k6/http, k6, k6/metrics, k6/execution, k6/encoding)
          - NEVER use ramping-vus executor — use constant-arrival-rate or ramping-arrival-rate
          - NEVER modify the execution command from AGENTS.md
          - NEVER read files beyond AGENTS.md and openapi.json
          - Follow ALL k6 generation rules in AGENTS.md exactly
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 900

  routers:
    - from: "kassandra"
      to: "end"

  flow:
    entry_point: "kassandra"
